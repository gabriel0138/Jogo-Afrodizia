<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Afrodizia - Racistas Não: O Jogo. Uma marcha pela igualdade e contra o racismo.">
    <meta name="theme-color" content="#050508">
    <title>Afrodizia - Racistas Não | O Jogo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.147.0/examples/jsm/"
        }
    }
    </script>
    
    <script>
        // Sistema de log de erro para ajudar no suporte
        window.onerror = function(msg, url, line) {
            console.error(`[Global Error] ${msg} at ${url}:${line}`);
            const errDiv = document.getElementById('global-error-log');
            if (errDiv) {
                errDiv.style.display = 'block';
                errDiv.innerText = `Erro: ${msg.substring(0, 60)}...`;
            }
        };
    </script>
</head>
<body>

    <!-- LOG DE ERRO (OCULTO POR PADRÃO) -->
    <div id="global-error-log" style="display:none; position:fixed; top:0; left:0; width:100%; background:rgba(255,0,0,0.9); color:white; font-size:10px; padding:5px; z-index:10000; text-align:center;"></div>

    <!-- TELA 0: CARREGAMENTO INICIAL (PRE-LOADER) -->
    <div id="loading-screen" class="screen" style="z-index: 1000; background: #050508;">
        <div class="content-box">
            <img src="assets/img/afrodizia.png" alt="Afrodizia" class="main-logo pulse">
            <div id="loading-status">CARREGANDO MARCHA...</div>
            <div class="progress-container">
                <div id="main-progress-bar" class="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- TELA 1: CADASTRO DO JOGADOR -->
    <div id="register-screen" class="screen" style="display:none;">
        <div class="content-box">
            <img src="assets/img/afrodizia.png" alt="Afrodizia Logo" class="main-logo">
            <h2>Racista Não.. O Jogo</h2>

            <div class="register-form">
                <div class="form-group">
                    <label for="input-name">NOME NA MARCHA</label>
                    <input type="text" id="input-name" maxlength="25" placeholder="Digite seu nome">
                </div>
                <div class="form-group">
                    <label for="input-instagram">INSTAGRAM (SEM @)</label>
                    <div class="input-insta-wrap">
                        <span class="insta-at">@</span>
                        <input type="text" id="input-instagram" maxlength="30" placeholder="seu.perfil">
                    </div>
                </div>
                <div id="register-error" class="form-error"></div>
                <button id="btn-register" class="btn-primary">CONFIRMAR REGISTRO</button>
            </div>
            <button id="btn-skip-register" class="btn-secondary" style="margin-top: 10px;">JOGAR COMO VISITANTE</button>
        </div>
    </div>

    <!-- TELA 2: MENU / SELECAO -->
    <div id="start-screen" class="screen" style="display:none;">
        <div class="content-box">
            <img src="assets/img/afrodizia.png" alt="Afrodizia" class="main-logo">
            
            <div class="player-stats">
                <span class="icon">✊🏿</span> Vozes: <strong id="total-vozes-display">0</strong>
            </div>

            <div class="character-select">
                <h3>ESCOLHA SEU LIDER</h3>
                <div class="carousel-container">
                    <button id="carousel-prev" class="carousel-arrow prev">‹</button>
                    <div class="char-options" id="char-carousel">
                        <button class="char-btn selected" data-char="massau" data-cost="0">
                            <div class="char-avatar" id="avatar-massau" data-src="assets/img/marcal_run_1.png"></div>
                            <div class="lock-overlay">🔒</div>
                            <span>Massau</span>
                        </button>
                        <button class="char-btn locked" data-char="tony" data-cost="1000">
                            <div class="char-avatar" id="avatar-tony" data-src="assets/img/tony_run_1.png"></div>
                            <div class="lock-overlay">🔒</div>
                            <span>Tony</span>
                        </button>
                        <button class="char-btn locked" data-char="priscilla" data-cost="2000">
                            <div class="char-avatar" id="avatar-priscilla" data-src="assets/img/priscilla_run_1.png"></div>
                            <div class="lock-overlay">🔒</div>
                            <span>Priscilla</span>
                        </button>
                        <button class="char-btn locked" data-char="morgado" data-cost="2500">
                            <div class="char-avatar" id="avatar-morgado" data-src="assets/img/morgado_run_1.png"></div>
                            <div class="lock-overlay">🔒</div>
                            <span>Morgado</span>
                        </button>
                        <button class="char-btn locked" data-char="sub" data-cost="5000">
                            <div class="char-avatar" id="avatar-sub" data-src="assets/img/marcal_run_1.png"></div>
                            <div class="lock-overlay">🔒</div>
                            <span>Sub</span>
                        </button>
                    </div>
                    <button id="carousel-next" class="carousel-arrow next">›</button>
                </div>
                <div class="carousel-hint">Arraste para os lados ↔️</div>
                <div id="char-description">⚡ Escolha o líder para comandar a revolução.</div>
            </div>

            <button id="btn-start" class="btn-primary" style="margin-top: 20px;">INICIAR PROTESTO</button>
            <button id="btn-open-ranking" class="btn-secondary" style="margin-top: 10px;">🏆 Ranking Mundial</button>
        </div>
    </div>

    <!-- TELA 3: FIM DE JOGO -->
    <div id="end-screen" class="screen" style="display: none;">
        <div class="content-box">
            <h1>A MARCHA CONTINUA</h1>
            <div class="result-card">
                <div id="final-score" class="result-score-value">0</div>
                <div class="result-score-label">VOZES REUNIDAS</div>
                <div id="result-rank-badge" class="result-rank-badge">Calculando...</div>
            </div>
            <div id="ranking-list" class="ranking-list"></div>
            <div class="end-buttons">
                <button id="btn-restart" class="btn-primary">JOGAR NOVAMENTE</button>
                <button id="btn-certificate" class="btn-secondary">📜 MEU CERTIFICADO</button>
                <button id="btn-open-ranking-end" class="btn-secondary">🏆 RANKING MUNDIAL</button>
            </div>
        </div>
    </div>

    <!-- TELA 4: RANKING FULL -->
    <div id="ranking-screen" class="screen" style="display: none;">
        <div class="content-box">
            <h2>RANKING MUNDIAL</h2>
            <div id="ranking-full-list" class="ranking-list"></div>
            <button id="btn-close-ranking" class="btn-secondary">FECHAR</button>
        </div>
    </div>

    <!-- CINEMATIC OVERLAY (Narrativa) -->
    <div id="cinematic-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; pointer-events: none;">
        <div id="cinematic-text" style="color: white; font-family: 'Oswald', sans-serif; font-size: clamp(1.5rem, 6vw, 3rem); text-align: center; max-width: 85%; line-height: 1.2; letter-spacing: 2px; text-transform: uppercase;"></div>
    </div>

    <!-- UI EM JOGO -->
    <div id="ui-container" style="display: none;">
        <div id="hud">
            <div class="score-box">VOZES: <span id="scoreDisplay">0</span></div>
        </div>
    </div>

    <div id="game-container"></div>
    <audio id="bg-music" src="assets/musica.mp3" preload="auto"></audio>

    <script type="module" src="js/main.js"></script>
</body>
</html>
